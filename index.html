<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>KSA Fast Quiz</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <main class="quiz-container">

    <header>
      <h1>🎯 KSA Fast Quiz</h1>
      <p>Luyện thi kiến thức KSA</p>
    </header>

    <section id="start-screen">
      <h2>Bài kiểm tra mẫu</h2>

      <p>
        Số câu: <b>5 câu</b><br>
        Thời gian: <b>5 phút</b>
      </p>

      <button onclick="startQuiz()">Bắt đầu làm bài</button>
    </section>

    <section id="quiz-screen" class="hidden">

      <div class="quiz-info">
        <span id="question-number">Câu 1/5</span>
        <span>⏱️ <b id="timer">05:00</b></span>
      </div>

      <div class="progress">
        <div id="progress-bar"></div>
      </div>

      <h2 id="question-text"></h2>

      <div id="answer-options"></div>

      <div class="buttons">
        <button class="gray" onclick="previousQuestion()">
          ← Câu trước
        </button>

        <button onclick="nextQuestion()">
          Câu tiếp →
        </button>
      </div>

      <button
        id="submit-button"
        class="submit hidden"
        onclick="submitQuiz()">
        Nộp bài
      </button>

    </section>

    <section id="result-screen" class="hidden">

      <h2>✅ Kết quả bài thi</h2>

      <div id="score"></div>

      <p id="result-message"></p>

      <button onclick="location.reload()">
        Làm lại
      </button>

      <div id="review"></div>

    </section>

  </main>

  <script src="script.js"></script>

</body>
</html>
